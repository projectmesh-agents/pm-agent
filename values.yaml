# pm-agent — default values
#
# Override any of these via `--values file.yaml` or `--set key=value` on
# `mesh run`. Values are deep-merged: set what you want to change, leave
# the rest alone.

version: "0.2.0"

# Claude model.
#   claude-opus-4-7   — best quality scoping. Higher cost.  (default)
#   claude-sonnet-4-6 — ~20% the cost of opus, very capable for PM work.
#   claude-haiku-4-5  — fastest and cheapest; fine for short clarifying loops.
model: claude-opus-4-7

# Unattended operation. PM work is scoping + spec writing, so the blast
# radius of tool calls is small. Keep true unless you want to review each
# permission prompt during development.
autonomous: true

# Ralph Loop tick cadence, in seconds.
#   activeSeconds — how often to check the queue when there's work in flight.
#   idleSeconds   — how often to check when the queue is empty.
cadence:
  activeSeconds: 60
  idleSeconds: 300

# Discord integration. Spec 12 v2 model: pair the bot once via
# `mesh discord pair --account <name> --token <token>`, then reference
# the account here. The token never appears in this file.
#
# subscriptionMode: "channel" (one specific channel) or "guild" (whole
# server, gated by Discord's per-channel permissions).
discord:
  enabled: false
  account: ""
  subscriptionMode: channel
  channelId: ""              # required when subscriptionMode=channel
  guildId: ""                # required when subscriptionMode=guild
  # If true, the PM only responds when the bot is @-mentioned. Useful in
  # busy general channels.
  requireMention: false
  # Restrict who can talk to the PM. Empty lists = anyone in the channel.
  # Either list being non-empty flips to allow-list mode; both set = OR.
  allowedUsers: []
  allowedRoles: []

# WhatsApp integration. Spec 14 / spec 15 slice 2. Pair once via
# `mesh whatsapp pair --account <name>` (QR scan from your phone),
# then reference the paired account + a specific chat JID here.
whatsapp:
  enabled: false
  account: ""
  chatJid: ""                # e.g. "120363xxx@g.us" (group) or
                             # "<number>@s.whatsapp.net" (DM)

# Peers — agent-to-agent messaging across the local mesh node.
# Spec 15 slice 3. Enabled by default so the PM is always reachable
# from other mesh agents at peers://agent/pm-agent. Add team names
# to also receive broadcasts to peers://team/<name>.
peers:
  enabled: true
  scope: machine             # only "machine" supported in slice 3
  teams: [pm]                # add e.g. "design", "research" to widen reach
