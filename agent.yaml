apiVersion: mesh.io/v1
kind: AgentTemplate
metadata:
  name: pm-agent
  version: 0.1.0
spec:
  description: >
    PM agent for Project Mesh. Takes fuzzy asks and produces spec-ready
    work items. Operates autonomously via the Ralph Loop.
  model: claude-opus-4-7
  tools:
    - Read
    - Write
    - Edit
    - Bash
    - Grep
    - Glob
    - WebFetch
    - Task
  # PM work is scoping + spec writing. It uses the `mesh` CLI heavily to move
  # work items through states. Skipping permissions lets it operate unattended.
  dangerouslySkipPermissions: true
  systemPromptPath: system_prompt.md
  requiredEnv: []
  # To add Discord integration, copy this template to a fork and add a channels
  # section here. See README for the exact shape.
  channels: []
